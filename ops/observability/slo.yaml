# Reference-only configuration. Alerts use contractor:slo_error_budget from
# ops/prometheus/rules/contractor_slo_rules.yaml as the source of truth.
slo_window: 30d
slo_targets:
  runtime:
    ask:
      path: /api/v1/runtime/ask
      availability_target: 0.995
  control:
    healthz:
      path: /api/v1/control/healthz
      availability_target: 0.995
