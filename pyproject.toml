[project]
name = "contractor"
version = "0.0.1"
description = "CONTRACTOR - multi-tenant contract-driven analytics runtime"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.27",
  "pydantic>=2.6",
  "pydantic-settings>=2.2",
  "PyYAML>=6.0",
  "jinja2>=3.1",
]

[tool.ruff]
line-length = 100
target-version = "py311"
