services:
  control:
    build: .
    command: ["python","-m","uvicorn","app.control_plane.api.main:app","--host","0.0.0.0","--port","8001"]
    ports: ["8001:8001"]
    env_file: .env
    environment:
      - BUNDLE_REGISTRY_BASE=registry/tenants
      - RUNTIME_BASE_URL=http://runtime:8000
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/control/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - contractor_net

  runtime:
    build: .
    command: ["python","-m","uvicorn","app.runtime.api.main:app","--host","0.0.0.0","--port","8000"]
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - CONTROL_BASE_URL=http://control:8001
      - BUNDLE_REGISTRY_BASE=registry/tenants
    volumes:
      - ./:/app
    depends_on:
      contractor_db:
        condition: service_healthy
      control:
        condition: service_healthy
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/runtime/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - contractor_net

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - contractor_net

  contractor_db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=SiriosPg2024
      - POSTGRES_DB=contractor
    volumes:
      - contractor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contractor"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - contractor_net

networks:
  contractor_net:
    external: true

volumes:
  contractor_pgdata:
