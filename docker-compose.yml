services:
  control:
    build: .
    command: ["python","-m","uvicorn","app.control_plane.api.main:app","--host","0.0.0.0","--port","8001"]
    ports: ["8001:8001"]
    env_file: .env
    environment:
      - BUNDLE_REGISTRY_BASE=registry/tenants
      - RUNTIME_BASE_URL=http://runtime:8000
      - RATE_LIMIT_REDIS_URL=redis://redis_runtime:6379/0
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/control/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - contractor_net

  runtime:
    build: .
    command: ["python","-m","uvicorn","app.runtime.api.main:app","--host","0.0.0.0","--port","8000"]
    ports: ["8000:8000"]
    cpus: "1.0"
    mem_limit: "1g"
    env_file: .env
    environment:
      - CONTROL_BASE_URL=http://control:8001
      - BUNDLE_REGISTRY_BASE=registry/tenants
      - RUNTIME_REDIS_URL=redis://redis_runtime:6379/0
      - RATE_LIMIT_REDIS_URL=redis://redis_runtime:6379/0
    volumes:
      - ./:/app
    depends_on:
      contractor_db:
        condition: service_healthy
      control:
        condition: service_healthy
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/runtime/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - contractor_net

  worker:
    build: .
    command: ["python","-m","app.runtime.worker.main"]
    cpus: "0.5"
    mem_limit: "512m"
    env_file: .env
    environment:
      - CONTROL_BASE_URL=http://control:8001
      - BUNDLE_REGISTRY_BASE=registry/tenants
      - RUNTIME_REDIS_URL=redis://redis_runtime:6379/0
      - RATE_LIMIT_REDIS_URL=redis://redis_runtime:6379/0
    volumes:
      - ./:/app
    depends_on:
      redis_runtime:
        condition: service_healthy
      runtime:
        condition: service_healthy
    networks:
      - contractor_net

  redis_runtime:
    image: redis:7-alpine
    cpus: "0.25"
    mem_limit: "256m"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - contractor_net

  contractor_db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=contractor
      - POSTGRES_DB=contractor
    volumes:
      - contractor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contractor"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - contractor_net

networks:
  contractor_net:
    driver: bridge

volumes:
  contractor_pgdata:
