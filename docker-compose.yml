services:
  control:
    build: .
    command: ["python","-m","uvicorn","app.control_plane.api.main:app","--host","0.0.0.0","--port","8001"]
    ports: ["8001:8001"]
    env_file: .env
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/control/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  runtime:
    build: .
    command: ["python","-m","uvicorn","app.runtime.api.main:app","--host","0.0.0.0","--port","8000"]
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./:/app
    depends_on:
      control:
        condition: service_healthy
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/runtime/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 3s
      retries: 10
