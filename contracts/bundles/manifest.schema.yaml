$schema: "https://json-schema.org/draft/2020-12/schema"
$title: "CONTRACTOR Bundle Manifest"
$type: object
additionalProperties: true
required:
  - bundle_id
  - tenant_id
  - created_at
  - source
  - checksum
  - paths
properties:
  bundle_id:
    type: string
    minLength: 1
  tenant_id:
    type: string
    minLength: 1
  created_at:
    type: string
    minLength: 1
  source:
    type: string
    minLength: 1
  checksum:
    type: string
    minLength: 1
  paths:
    type: object
    additionalProperties: false
    required:
      - ontology_dir
      - entities_dir
      - policies_dir
      - templates_dir
      - suites_dir
    properties:
      ontology_dir:
        type: string
        minLength: 1
      entities_dir:
        type: string
        minLength: 1
      policies_dir:
        type: string
        minLength: 1
      templates_dir:
        type: string
        minLength: 1
      suites_dir:
        type: string
        minLength: 1
