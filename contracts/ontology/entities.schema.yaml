$schema: "https://json-schema.org/draft/2020-12/schema"
$title: "CONTRACTOR Ontology - Entities"
$type: object
$additionalProperties: false
required: [version, entities]
properties:
  version:
    type: integer
    minimum: 1
  entities:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, title]
      properties:
        id:
          type: string
          minLength: 1
          pattern: "^[a-z][a-z0-9_]*$"
        title:
          type: string
          minLength: 1
        description:
          type: string
        kind:
          type: string
          minLength: 1
