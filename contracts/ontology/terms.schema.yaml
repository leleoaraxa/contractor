$schema: "https://json-schema.org/draft/2020-12/schema"
$title: "CONTRACTOR Ontology - Terms"
$type: object
$additionalProperties: false
required: [version, terms]
properties:
  version:
    type: integer
    minimum: 1
  terms:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [term, intents, entities]
      properties:
        term:
          type: string
          minLength: 1
        intents:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_]*$"
        entities:
          type: array
          items:
            type: string
            pattern: "^[a-z][a-z0-9_]*$"
